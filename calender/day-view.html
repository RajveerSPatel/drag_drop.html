<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day View</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .lesson-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .lesson-item span {
      font-size: 14px;
      font-weight: 500;
    }

    .picker-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 8px;
      text-align: left;
    }

    .picker-btn:hover {
      background: #f5f7ff;
      border-color: #3b5bdb;
    }

    .picker-btn.added {
      opacity: 0.45;
      cursor: default;
    }

    .picker-btn.added:hover {
      background: #fff;
      border-color: #e0e0e0;
    }

    .picker-tag {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>

  <a class="back-link" href="calendar.html">← Back to calendar</a>

  <h1 id="date-title"></h1>

  <h2>Lessons for this day</h2>
  <div id="day-lessons"></div>

  <h2>Add a lesson</h2>
  <div id="lesson-picker"></div>

  <script src="day-view.js"></script>
</body>
</html>
